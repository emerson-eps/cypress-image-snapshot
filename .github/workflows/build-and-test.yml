name: build-and-test

on: [push, pull_request]

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: './.github/actions/install'
  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: '0'
      - name: yarn install
        uses: ./.github/actions/yarn-nm-install
      - name: Run lint
        if: ${{ github.ref == 'refs/heads/master' }}
        run: yarn lint

  cypress:
    needs: [install, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: yarn install
        uses: ./.github/actions/yarn-nm-install
      - name: Restore Cypress binary
        run: yarn install
      - name: Run tests
        run: yarn test:run

  release:
    needs: [cypress, lint]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC
      contents: write # Required for semantic-release to create tags
      pull-requests: write # Required for semantic-release to comment on PRs
    steps:
      - uses: actions/checkout@v6
      - name: yarn install
        uses: ./.github/actions/yarn-nm-install
      - name: Release
        if: ${{ github.ref == 'refs/heads/master' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ci:build outputs all the files to the root so that users do not
          # need to install from `dist`
          yarn ci:build
          yarn release
